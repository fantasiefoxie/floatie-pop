<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Velvet Pop</title>
<link href="https://fonts.googleapis.com/css2?family=Comfortaa:wght@500;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/core.css">
<link rel="stylesheet" href="css/game.css">
<link rel="stylesheet" href="css/deck.css">
</head>

<body>

<div id="celebrate" style="display: block;">
  <div id="stats"></div>
  <div id="score">Score: 0</div>
  <div id="timer" style="display: none;">Time: 0:00</div>
  <div id="runInfo" style="display: none;"></div>
  <div id="playArea"></div>
  <div id="combo"></div>
  <div id="modeBtn">Survival Mode</div>
  <div id="runBtn">Start Run</div>
  <div id="progressBtn">🏆 Progress</div>
  <div id="perfBtn">🔍 Performance</div>
  <div id="shareBtn" style="display: none;">📤 Share Score</div>
  <div id="deckBtn">View Deck</div>
</div>

<div id="cardReveal"></div>

<div id="deckPanel">
  <div id="deckBack">← Back to Game</div>
  <h2>Your Love Deck</h2>
  <div class="cardGrid" id="cardGrid"></div>
</div>

<audio id="bg" src="bg.mp3" loop></audio>
<audio id="blue" src="blue.mp3" loop></audio>
<audio id="maw" src="maw.mp3"></audio>
<audio id="popSound" src="pop.mp3"></audio>

<script type="module" src="js/main.js"></script>
</body>
</html>

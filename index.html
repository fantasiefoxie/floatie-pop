<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
    <title>Floatie Pop | Premium Experience</title>
    <!-- Premium Design System -->
    <link rel="stylesheet" href="css/index.css?v=19">
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🫧</text></svg>">
</head>
<body>
    <!-- Animated Cosmic Background -->
    <div id="background-layer"></div>

    <!-- Gameplay Area -->
    <div id="playArea">
        <!-- The canvas is injected here by the RenderSystem -->
    </div>

    <!-- UI Overlay Layer -->
    <div id="ui-root">
        <!-- Top HUD: Score & Combo -->
        <div class="header-bar glass-panel">
            <div class="stat-group">
                <span class="stat-label">Score</span>
                <span id="score-display" class="stat-value">0</span>
            </div>
            <div class="stat-group">
                <span class="stat-label">Combo</span>
                <span id="combo-display" class="stat-value">1.0x</span>
            </div>
        </div>

        <!-- Floating Controls -->
        <div id="settings-toggle" class="btn-round glass-panel">⚙️</div>
        <div id="mode-toggle" class="btn-round glass-panel">🏆</div>
        <div id="deck-access" class="btn-round glass-panel">🃏</div>
    </div>

    <!-- Game Flow Overlays (Modals) -->
    <div id="menu-overlay" class="overlay">
        <div class="modal glass-panel">
            <h1 style="font-size: 64px; line-height: 0.9; margin-bottom: 8px;">FLOATIE<br><span style="color: var(--accent-primary)">POP</span></h1>
            <p style="opacity: 0.6; font-weight: 600; letter-spacing: 0.2em; margin-bottom: 24px;">PREMIUM CHILL</p>
            <button id="start-btn" class="primary-btn">START SESSION</button>
        </div>
    </div>

    <div id="game-over-overlay" class="overlay">
        <div class="modal glass-panel">
            <h2 style="font-size: 48px; color: var(--accent-primary); margin-bottom: 16px;">SESSION ENDED</h2>
            <div style="margin: 32px 0;">
                <p class="stat-label">Final Score</p>
                <p id="final-score" class="stat-value" style="font-size: 56px; color: var(--accent-secondary);">0</p>
            </div>
            <div style="display: flex; gap: 16px; justify-content: center;">
                <button id="restart-btn" class="primary-btn" style="margin-top: 0;">PLAY AGAIN</button>
            </div>
        </div>
    </div>

    <!-- Main Entry Point -->
    <script type="module" src="js/main.js?v=19"></script>
</body>
</html>
